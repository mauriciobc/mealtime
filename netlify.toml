# Netlify configuration for Next.js 16
# Rate limiting: auth routes use authRateLimiter in app/api/auth/mobile/* (5 req/15min per IP).
# For site-wide Netlify rate limiting, configure Team Rulesets in Netlify dashboard (Enterprise)
# or add edge function config — see https://docs.netlify.com/manage/security/secure-access-to-sites/rate-limiting/

[build]
  command = "npm run build"
  # Build usa --webpack flag para compatibilidade com config webpack customizada

[build.environment]
  NODE_VERSION = "22.13.0"
  NPM_FLAGS = "--include=dev"

# Preview Server — [build] is NOT run before [dev]; this command builds then serves.
# Using `next start` (not `next dev`) avoids Next.js 16 cross-origin dev chunk blocking.
[dev]
  command = "npm run start:preview"
  targetPort = 3000
  port = 8888
  framework = "#custom"

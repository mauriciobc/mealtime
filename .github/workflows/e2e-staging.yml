name: E2E Staging

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  secrets-gate:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          if [ -n "$BASE_URL" ] && [ -n "$TEST_EMAIL" ] && [ -n "$TEST_PASSWORD" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "E2E staging secrets not configured — skipping"
          fi

  e2e:
    needs: secrets-gate
    if: needs.secrets-gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e -- --project=chromium-unauthenticated tests/security.spec.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - run: npm run test:e2e -- --project=chromium tests/cats.spec.ts tests/feedings.spec.ts tests/households.spec.ts tests/notifications-triggers.spec.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
